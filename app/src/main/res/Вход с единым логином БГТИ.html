	
	
	
<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<HTML>
 <head>
  <title>Вход с единым логином БГТИ</title>
  <link rel="shortcut icon" href="http://www.bgti.ru/Images/Logo.ico">
  <meta http-equiv="content-type" content="text/html; charset=utf-8">
  <link type="text/css" rel="stylesheet" href="Css/Styles.css">
  
  <style type="text/css">
    
   a.rndbtn { background-color:#739c42;color:#fff;border-radius:22px; display:block;height:44px;line-height:44px;text-align:center;width:300px;text-decoration:none;transition:opacity 0.5s;
    font-size:17px; }
   a.rndbtn:hover { opacity:0.8; }
 
   
   @media screen and (min-width: 0px) {
    .fsize {  font-size:60px; }
    .rtpic {	display:none; }
    table.tbmain {	width:90%; }
   }
   
   @media screen and (min-width: 800px) {
   .fsize {  font-size:60px; }
   .rtpic {	display:table-cell; }
   }

   

   @media screen and (min-width: 1340px) {
    .fsize {  font-size:80px; }
    .rtpic {	display:table-cell; }
    table.tbmain {	width:60%; }
   }
   
   div.lbl { color:#808080;font-size:13px;text-align:left; padding:0 0 4px 7px; }

  .password {	position: relative; }

  .password-control {	position:absolute;top:9px;right:9px;display:inline-block;width:20px;height:20px;background: url(Images/view.svg) 0 0 no-repeat;opacity:0.7; }
  .password-control.view { background: url(Images/no-view.svg) 0 0 no-repeat; }

  div.chtxt {	background-image:url('Images/CheckGr.png'); background-position:left 2px;background-repeat:no-repeat;background-size:16px;padding-left:20px;margin-top:13px;font-size:15px;color:#707070; }

  </style>
  

  
  
 </head>
 
 <body>
 
 <table cellpadding="0" cellspacing="0" border="0" style="width:100%;height:100%;">
 <tr>
  <td align="center" valign="top" style="width:40%;padding:20px;box-sizing:border-box;background-color:#e9e9e9">
  
 <form method="post" action="SigninPOST.aspx" style="padding:0;margin:0;" onsubmit="return CheckForm();" id="idloginform">
 
  <table class="tbmain" cellpadding="0" cellspacing="0" border="0">
  <tr>
  <td align="center" valign="top">
   <img src="Images/Logo256.png" style=" width:180px" onclick="location.href='http://bgti.ru'"><br>
   <div style="font-size:18px;text-shadow:0 0 1px #909090;padding-top:20px">Вход с единым логином БГТИ</div>
  </td>
  </tr>
  
  <tr>
   <td align="center" valign="top" style="padding-top:40px">
    <div class="lbl" id="idlbl1">Введите логин</div>
    <input class="forminput" type="text" maxlength="80" name="login" style="width:100%" onfocus="OnInpFocus(1)" onblur="OnOutFocus(1)" id="idedit1">
    <div style="padding-top:5px;padding-left:5px;font-size:13px;color:#ca3d2e;text-align:left;display:none" id="idloginmsg">Не указан логин!</div>
   </td>
  </tr>
  <tr>
   <td align="center" valign="top" style="padding-top:30px">
    <div class="lbl" id="idlbl2">Введите пароль</div>
    <div class="password">
     <input class="forminput" type="password" maxlength="16" name="psw" style="width:100%" onfocus="OnInpFocus(2)" onblur="OnOutFocus(2)"  id="idedit2">
     <a href="javascript:void(0)" class="password-control" onclick="return ShowHhidePassword(this);"></a>
    </div>
    <div style="padding-top:5px;padding-left:5px;font-size:13px;color:#ca3d2e;text-align:left;display:none" id="idpswmsg2">Не указан пароль!</div>
   </td>
  </tr>
  
  
 
  <tr>
  <td align="center" valign="middle" style="padding-top:30px">
   <div class="dlgbtn" onclick="CheckForm()">Войти</div>
   <input type="submit" style="display:none">
  </td>
  </tr>
  <tr>
  <td align="left" valign="top" style="font-family:'Roboto', Tahoma, Arial, Helvetica; padding-top:50px;">
   <div style="padding-left:20px;text-shadow:0 0 1px #b0b0b0;padding-bottom:5px;color:#667">Здесь осуществляется доступ к подсистемам БГТИ (филиала) ОГУ:</div>
   <div class="chtxt">Личный кабинет преподавателя</div>
   <div class="chtxt">Личный кабинет студента</div>
   <div class="chtxt">Личный кабинет слушателя курсов дополнительного образования</div>
  </td>
  </tr>
  </table>
  <input type="hidden" name="ssid" value="">
  <input type="hidden" name="page" value="0">
  </form>
   
   
  </td>
  
  <td class="rtpic" align="center" valign="middle" style="background-color:#d2d3d5;background-image:url('Images/Rtimg.jpg');background-size:cover;
  background-repeat:no-repeat;background-position:right center;">
   
  </td>
 </tr>
 </table>
  
 <script type="text/javascript" src="../Js/jquery-1.10.2.min.js"></script>

 
 <script type="text/javascript">
  
  function OnInpFocus(n) {
   document.getElementById('idlbl'+n).style.color="#5773f0";
  }

  function OnOutFocus(n) {
   document.getElementById('idlbl'+n).style.color="#808080";
  }
  
  function CheckForm() {
   var berror=0;
   
   var login=document.getElementById("idedit1").value;
   if(login=="") { document.getElementById("idedit1").className="forminput-error"; document.getElementById("idloginmsg").style.display=""; berror=1; }
   else { document.getElementById("idedit1").className="forminput"; document.getElementById("idloginmsg").style.display="none"; }
   
   var psw=document.getElementById("idedit2").value;
   if(psw=="") { document.getElementById("idedit2").className="forminput-error"; document.getElementById("idpswmsg2").style.display=""; berror=1; }
   else { document.getElementById("idedit2").className="forminput"; document.getElementById("idpswmsg2").style.display="none"; }
   
   if(berror==1) return false;
   
   document.getElementById('idloginform').submit();
  }

  function ShowHhidePassword(target) {
	  var input = document.getElementById("idedit2");
 	 if(input.getAttribute('type') == 'password') { target.classList.add('view'); input.setAttribute('type', 'text'); }
 	 else { target.classList.remove('view'); input.setAttribute('type', 'password'); }
 	 return false;
  }

 </script>

 
 </body>
</HTML>
